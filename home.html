<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2b2520" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ShareLink" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse — ShareLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      min-height: 100vh;
      background: var(--nude-50);
    }

    /* ---- APP NAV (logged in) ---- */
    .app-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      background: rgba(253,248,245,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--nude-200);
    }

    .app-nav__logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--char);
    }

    .app-nav__search {
      flex: 1;
      max-width: 420px;
      margin: 0 32px;
      position: relative;
    }

    .app-nav__search input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--nude-200);
      border-radius: 100px;
      background: var(--nude-100);
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--char);
      outline: none;
      transition: border-color var(--transition);
    }

    .app-nav__search input:focus {
      border-color: var(--char);
      background: white;
    }

    .app-nav__search input::placeholder { color: var(--char-soft); }

    .app-nav__search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--char-soft);
      pointer-events: none;
      font-size: 15px;
    }

    .app-nav__right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-nav__post-btn {
      background: var(--char);
      color: var(--nude-50);
      padding: 9px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }

    .app-nav__post-btn:hover {
      background: var(--rose-dark);
    }

    .app-nav__avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--rose);
      color: white;
      font-family: var(--font-display);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .app-nav__avatar:hover { opacity: 0.8; }

    /* ---- MAIN LAYOUT ---- */
    .page-body {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      padding-top: 64px;
      min-height: 100vh;
    }

    /* ---- SIDEBAR FILTERS ---- */
    .sidebar {
      padding: 32px 24px;
      border-right: 1px solid var(--nude-200);
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }

    .sidebar__section {
      margin-bottom: 32px;
    }

    .sidebar__label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--char-soft);
      margin-bottom: 12px;
    }

    .filter-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 14px;
      color: var(--char-mid);
    }

    .filter-item:hover {
      background: var(--nude-100);
      color: var(--char);
    }

    .filter-item.active {
      background: var(--char);
      color: var(--nude-50);
    }

    .filter-item__count {
      font-size: 12px;
      opacity: 0.6;
    }

    .filter-item.active .filter-item__count {
      opacity: 0.6;
    }

    /* Condition checkboxes */
    .condition-check {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;
      font-size: 14px;
      color: var(--char-mid);
    }

    .condition-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--char);
      cursor: pointer;
    }

    /* ---- FEED MAIN ---- */
    .feed-main {
      padding: 32px 40px;
    }

    .feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .feed-header h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 500;
      color: var(--char);
    }

    .feed-header__meta {
      font-size: 14px;
      color: var(--char-soft);
    }

    .feed-sort {
      padding: 8px 16px;
      border: 1.5px solid var(--nude-200);
      border-radius: 100px;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--char-mid);
      background: white;
      cursor: pointer;
      outline: none;
    }

    /* ---- ITEM GRID ---- */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .item-card {
      background: white;
      border: 1px solid var(--nude-200);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
    }

    .item-card:hover {
      border-color: var(--nude-300);
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .item-card__image {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--nude-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      position: relative;
      overflow: hidden;
    }

    .item-card__badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: white;
      border: 1px solid var(--nude-200);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      color: var(--char-mid);
    }

    .item-card__badge.new {
      background: var(--char);
      color: var(--nude-50);
      border-color: var(--char);
    }

    .item-card__save {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: white;
      border: 1px solid var(--nude-200);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      transition: all var(--transition);
      opacity: 0;
    }

    .item-card:hover .item-card__save {
      opacity: 1;
    }

    .item-card__save.saved {
      opacity: 1;
      background: var(--rose);
      border-color: var(--rose);
    }

    .item-card__body {
      padding: 16px;
    }

    .item-card__cat {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 6px;
    }

    .item-card__name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      color: var(--char);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .item-card__desc {
      font-size: 13px;
      color: var(--char-soft);
      line-height: 1.5;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-card__footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .item-card__location {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--char-soft);
    }

    .item-card__request-btn {
      padding: 7px 16px;
      background: var(--char);
      color: var(--nude-50);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-body);
      border: none;
      cursor: pointer;
      transition: all var(--transition);
    }

    .item-card__request-btn:hover {
      background: var(--rose-dark);
    }

    @media (max-width: 900px) {
      .page-body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .feed-main { padding: 20px; }
      .app-nav { padding: 0 20px; }
      .app-nav__search { display: none; }
    }
  </style>
</head>
<body>

  <!-- APP NAV -->
  <nav class="app-nav">
    <a href="index.html" class="app-nav__logo">ShareLink</a>

    <div class="app-nav__search">
      <span class="app-nav__search-icon">⌕</span>
      <input type="text" placeholder="Search items..." id="search-input" />
    </div>

    <div class="app-nav__right">
      <button class="app-nav__post-btn" onclick="window.location.href='post-item.html'">
        + Post item
      </button>
      <a href="profile.html" class="app-nav__avatar">S</a>
    </div>
  </nav>

  <!-- PAGE BODY -->
  <div class="page-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__label">Category</div>
        <ul class="filter-list" id="category-filters">
          <li class="filter-item active" data-cat="all">All items <span class="filter-item__count">1,496</span></li>
          <li class="filter-item" data-cat="books">📚 Books &amp; Education <span class="filter-item__count">348</span></li>
          <li class="filter-item" data-cat="electronics">💻 Electronics <span class="filter-item__count">182</span></li>
          <li class="filter-item" data-cat="clothing">👗 Clothing <span class="filter-item__count">510</span></li>
          <li class="filter-item" data-cat="furniture">🪑 Furniture <span class="filter-item__count">97</span></li>
          <li class="filter-item" data-cat="kitchen">🍳 Kitchen <span class="filter-item__count">203</span></li>
          <li class="filter-item" data-cat="sports">⚽ Sports &amp; Hobbies <span class="filter-item__count">156</span></li>
        </ul>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__label">Condition</div>
        <label class="condition-check">
          <input type="checkbox" checked /> New / Unused
        </label>
        <label class="condition-check">
          <input type="checkbox" checked /> Like new
        </label>
        <label class="condition-check">
          <input type="checkbox" checked /> Good
        </label>
        <label class="condition-check">
          <input type="checkbox" /> Fair
        </label>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__label">Distance</div>
        <ul class="filter-list">
          <li class="filter-item active">Within 2km</li>
          <li class="filter-item">Within 5km</li>
          <li class="filter-item">Within 10km</li>
          <li class="filter-item">Anywhere</li>
        </ul>
      </div>
    </aside>

    <!-- FEED MAIN -->
    <main class="feed-main">
      <div class="feed-header">
        <div>
          <h1>All items</h1>
          <p class="feed-header__meta" id="result-count">1,496 items available near you</p>
        </div>
        <select class="feed-sort" id="sort-select">
          <option>Newest first</option>
          <option>Closest first</option>
          <option>Most requested</option>
        </select>
      </div>

      <div class="item-grid" id="item-grid">
        <!-- Cards injected by JS -->
      </div>
    </main>
  </div>

  <script>
    // --- Sample items data ---
    const items = [
      {
        id: 1, emoji: '📚', cat: 'books',
        name: 'WAEC Biology Textbook',
        desc: 'Stone & Pickering, 2020 edition. Very good condition, a few pencil notes inside.',
        condition: 'Like new', location: 'Yaba', isNew: true,
      },
      {
        id: 2, emoji: '💻', cat: 'electronics',
        name: 'USB-C Charging Cable',
        desc: 'Braided cable, 2m. Works perfectly, just have too many.',
        condition: 'New', location: 'Lekki', isNew: false,
      },
      {
        id: 3, emoji: '👗', cat: 'clothing',
        name: 'School Uniform (Size 14)',
        desc: 'Complete set — shirt, trousers, tie. Worn for one term only.',
        condition: 'Like new', location: 'Surulere', isNew: true,
      },
      {
        id: 4, emoji: '🍳', cat: 'kitchen',
        name: 'Non-stick Frying Pan',
        desc: 'Good quality 24cm pan, non-stick still works great. Upgraded to a new set.',
        condition: 'Good', location: 'Ikeja', isNew: false,
      },
      {
        id: 5, emoji: '⚽', cat: 'sports',
        name: 'Football Boots (Size 41)',
        desc: 'Nike Phantom, worn twice for training. Outgrew them quickly.',
        condition: 'Like new', location: 'VI', isNew: false,
      },
      {
        id: 6, emoji: '📖', cat: 'books',
        name: 'Complete A-Level Chemistry',
        desc: 'Complete set of A-level Chemistry textbooks + past papers.',
        condition: 'Good', location: 'Ikoyi', isNew: true,
      },
      {
        id: 7, emoji: '🪑', cat: 'furniture',
        name: 'Wooden Study Chair',
        desc: 'Solid wood, comfortable. Moving flat and can\'t take it with me.',
        condition: 'Good', location: 'Yaba', isNew: false,
      },
      {
        id: 8, emoji: '🎒', cat: 'clothing',
        name: 'School Backpack',
        desc: 'Large Jansport backpack. One small zipper is stuck but main compartment perfect.',
        condition: 'Good', location: 'Lekki', isNew: false,
      },
      {
        id: 9, emoji: '🔌', cat: 'electronics',
        name: 'Universal Power Strip',
        desc: '4-way extension with surge protection. Works great, just bought a new one.',
        condition: 'Good', location: 'Surulere', isNew: false,
      },
      {
        id: 10, emoji: '📐', cat: 'books',
        name: 'Maths Past Papers Bundle',
        desc: 'IGCSE Maths 2018–2023 past papers, all with mark schemes.',
        condition: 'New', location: 'Ikeja', isNew: true,
      },
      {
        id: 11, emoji: '🏋️', cat: 'sports',
        name: 'Resistance Bands Set',
        desc: 'Set of 5 resistance bands, different strengths. Used maybe 3 times.',
        condition: 'Like new', location: 'VI', isNew: false,
      },
      {
        id: 12, emoji: '🪴', cat: 'furniture',
        name: 'Desk Lamp',
        desc: 'LED desk lamp, adjustable brightness. Bulb works perfectly.',
        condition: 'Good', location: 'Ikoyi', isNew: false,
      },
    ];

    let activeCategory = 'all';
    let savedItems = new Set();

    function renderCards(data) {
      const grid = document.getElementById('item-grid');
      grid.innerHTML = '';

      if (data.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--char-soft);">
          <div style="font-size:40px; margin-bottom:12px;">🔍</div>
          <p>No items found. Try a different filter.</p>
        </div>`;
        return;
      }

      data.forEach((item, i) => {
        const isSaved = savedItems.has(item.id);
        const card = document.createElement('div');
        card.className = 'item-card';
        card.style.animationDelay = `${i * 40}ms`;
        card.innerHTML = `
          <div class="item-card__image">
            ${item.emoji}
            ${item.isNew ? '<span class="item-card__badge new">New</span>' : `<span class="item-card__badge">${item.condition}</span>`}
            <button class="item-card__save ${isSaved ? 'saved' : ''}" data-id="${item.id}" title="Save item">
              ${isSaved ? '♥' : '♡'}
            </button>
          </div>
          <div class="item-card__body">
            <div class="item-card__cat">${item.cat}</div>
            <div class="item-card__name">${item.name}</div>
            <div class="item-card__desc">${item.desc}</div>
            <div class="item-card__footer">
              <span class="item-card__location">📍 ${item.location}</span>
              <button class="item-card__request-btn">Request</button>
            </div>
          </div>
        `;

        // Save toggle
        card.querySelector('.item-card__save').addEventListener('click', (e) => {
          e.stopPropagation();
          const btn = e.currentTarget;
          if (savedItems.has(item.id)) {
            savedItems.delete(item.id);
            btn.innerHTML = '♡';
            btn.classList.remove('saved');
          } else {
            savedItems.add(item.id);
            btn.innerHTML = '♥';
            btn.classList.add('saved');
          }
        });

        // Click card → item detail
        card.addEventListener('click', (e) => {
          if (e.target.closest('.item-card__save') || e.target.closest('.item-card__request-btn')) return;
          window.location.href = `item-detail.html?id=${item.id}`;
        });

        // Request button
        card.querySelector('.item-card__request-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          const btn = e.currentTarget;
          btn.textContent = 'Requested ✓';
          btn.style.background = 'var(--sage)';
          btn.disabled = true;
        });

        grid.appendChild(card);
      });
    }

    function filterAndRender() {
      const query = document.getElementById('search-input').value.toLowerCase();
      let filtered = items.filter(item => {
        const matchesCat = activeCategory === 'all' || item.cat === activeCategory;
        const matchesSearch = !query ||
          item.name.toLowerCase().includes(query) ||
          item.desc.toLowerCase().includes(query) ||
          item.location.toLowerCase().includes(query);
        return matchesCat && matchesSearch;
      });

      document.getElementById('result-count').textContent =
        `${filtered.length} item${filtered.length !== 1 ? 's' : ''} available near you`;
      renderCards(filtered);
    }

    // Category filters
    document.querySelectorAll('.filter-item[data-cat]').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.filter-item[data-cat]').forEach(f => f.classList.remove('active'));
        el.classList.add('active');
        activeCategory = el.dataset.cat;
        filterAndRender();
      });
    });

    // Search
    document.getElementById('search-input').addEventListener('input', filterAndRender);

    // Initial render
    filterAndRender();
  </script>
</body>
</html>
